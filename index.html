<head>

<style>

body{
margin:0;

header{
background:linear-gradient(90deg,#000,#7a0000,#ff0000);

header img{

/* SEARCH */

}

/* CATEGORY TITLE */
.category{

/* SONG CARD */
.song{

<body>

<header>
<img src="images/logo.png">
<h1>JayVox</h1>

<div class="search-box">
<input id="search" placeholder="Search songs...">
</div>

<div id="songs"></div>

<div class="about-link">
<a href="about.html">About Jayanta</a>
</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyACzipenb7Sx0-XsNF8xiNCEE8uIeOsXuU",
authDomain: "jayvox-be536.firebaseapp.com",
databaseURL: "https://jayvox-be536-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "jayvox-be536",
storageBucket: "jayvox-be536.firebasestorage.app",
messagingSenderId: "427814511964",
appId: "1:427814511964:web:e8a16e2e2275ef1d160d99"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let playedFlag = {};

async function loadSongs(){

const res = await fetch("songs.json");
const songs = await res.json();

const container=document.getElementById("songs");
container.innerHTML="";

const groups={};

songs.forEach(song=>{
if(!groups[song.category]) groups[song.category]=[];
groups[song.category].push(song);
});

for(const category in groups){

const title=document.createElement("div");
title.className="category";
title.innerText=category;
container.appendChild(title);

groups[category].forEach(song=>{

const card=document.createElement("div");
card.className="song";

card.innerHTML=`
<img src="images/${song.image}">
<div class="song-info">
<h2>${song.title}</h2>
<audio controls preload="none">
<source src="${song.file}" type="audio/mpeg">
</audio>
<div class="plays" id="play-${song.title}">Played 0 times</div>
</div>
`;

container.appendChild(card);

const audio=card.querySelector("audio");
const playRef=ref(db,"plays/"+song.title);

get(playRef).then(snapshot=>{
if(snapshot.exists())
document.getElementById("play-"+song.title).innerText=
"Played "+snapshot.val()+" times";
});

audio.addEventListener("play",async()=>{

if(playedFlag[song.title]) return;

playedFlag[song.title]=true;

let count=0;
const snap=await get(playRef);
if(snap.exists()) count=snap.val();

set(playRef,count+1);

document.getElementById("play-"+song.title).innerText=
"Played "+(count+1)+" times";

});

});

}

}

loadSongs();

/* SEARCH */

document.getElementById("search").addEventListener("input",e=>{
const text=e.target.value.toLowerCase();
document.querySelectorAll(".song").forEach(song=>{
song.style.display=
song.innerText.toLowerCase().includes(text)
?"flex":"none";
});
});

</script>

</body>
</html>
