<style>

<body>

<header>
<img src="images/logo.jpg">
<h1>JayVox</h1>
</header>

<div class="search">
<input id="search" placeholder="Search songs...">
</div>

<div id="music"></div>

<footer>
<p>© JayVox Music Platform</p>
<a href="about.html" style="color:#ff4444;">About Jayanta</a>
</footer>

<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
runTransaction,
onValue
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyACzipenb7Sx0-XsNF8xiNCEE8uIeOsXuU",
authDomain:"jayvox-be536.firebaseapp.com",
databaseURL:"https://jayvox-be536-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"jayvox-be536",
storageBucket:"jayvox-be536.firebasestorage.app",
messagingSenderId:"427814511964",
appId:"1:427814511964:web:e8a16e2e2275ef1d160d99"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const container=document.getElementById("music");

async function loadSongs(){

const res=await fetch("songs.json");
const songs=await res.json();

renderSongs(songs);

document.getElementById("search")
.addEventListener("input",e=>{
const q=e.target.value.toLowerCase();
renderSongs(
songs.filter(s=>s.title.toLowerCase().includes(q))
);
});
}

function renderSongs(songs){

container.innerHTML="";
const categories={};

songs.forEach(song=>{
if(!categories[song.category])
categories[song.category]=[];
categories[song.category].push(song);
});

for(const cat in categories){

const h=document.createElement("h2");
h.className="category";
h.innerText=cat;
container.appendChild(h);

categories[cat].forEach(song=>{

const slug=song.title.toLowerCase().replace(/\s+/g,'-');

const div=document.createElement("div");
div.className="song";

div.innerHTML=`
<img src="images/${song.image}">
<div class="song-info">

<h3>
<a href="song.html?song=/${slug}">
${song.title}
</a>
</h3>

<audio controls src="${song.file}"></audio>

<p id="count-${slug}">Played 0 times</p>

</div>
`;

container.appendChild(div);

setupCounter(slug,div.querySelector("audio"));

});
}
}

function setupCounter(slug,audio){

let counted=false;
const playRef=ref(db,"plays/"+slug);

onValue(playRef,snap=>{
document.getElementById("count-"+slug).innerText=
"Played "+(snap.val()||0)+" times";
});

audio.addEventListener("play",()=>{
if(counted) return;
counted=true;

runTransaction(playRef,current=>{
return (current||0)+1;
});
});
}

loadSongs();

</script>

</body>
