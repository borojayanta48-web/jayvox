<!-- ===== Firebase ===== -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
get,
set,
increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyACzipenb7Sx0-XsNF8xiNCEE8uIeOsXuU",
authDomain:"jayvox-be536.firebaseapp.com",
databaseURL:"https://jayvox-be536-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"jayvox-be536",
storageBucket:"jayvox-be536.firebasestorage.app",
messagingSenderId:"427814511964",
appId:"1:427814511964:web:e8a16e2e2275ef1d160d99"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let allSongs=[];

fetch("songs.json")
.then(r=>r.json())
.then(data=>{
allSongs=data;
renderSongs(data);
});

function slug(title){
return title.toLowerCase().replace(/\s+/g,"-");
}

async function renderSongs(songs){

const container=document.getElementById("songsContainer");
container.innerHTML="";

let grouped={};

songs.forEach(song=>{
if(!grouped[song.category])
grouped[song.category]=[];

grouped[song.category].push(song);
});

for(const category in grouped){

container.innerHTML+=`<h2 class="category">${category}</h2>`;

for(const song of grouped[category]){

const id=slug(song.title);

const playRef=ref(db,"plays/"+id);
let count=0;

try{
const snap=await get(playRef);
if(snap.exists()) count=snap.val();
}catch{}

const audioSrc=
song.file.startsWith("http")
? song.file
: "./songs/"+song.file;

const card=document.createElement("div");
card.className="song-card";

card.innerHTML=`
<div class="song-title"
onclick="window.location.href='song.html?song='+encodeURIComponent('${id}')">
${song.title}
</div>

<img class="song-img" src="images/${song.image}">

<audio controls preload="none" data-id="${id}">
<source src="${audioSrc}" type="audio/mpeg">
</audio>

<div id="count-${id}">Played ${count} times</div>
`;

container.appendChild(card);
}
}

attachPlayCounter();
}

function attachPlayCounter(){

document.querySelectorAll("audio").forEach(audio=>{

let counted=false;

audio.addEventListener("play",async()=>{

if(counted) return;

counted=true;

const id=audio.dataset.id;

const playRef=ref(db,"plays/"+id);

await set(playRef,increment(1));

const snap=await get(playRef);

if(snap.exists())
document.getElementById("count-"+id)
.innerText="Played "+snap.val()+" times";
});
});
}

window.searchSongs=function(text){

text=text.toLowerCase();

const filtered=allSongs.filter(s=>
s.title.toLowerCase().includes(text)
);

renderSongs(filtered);
}

</script>
