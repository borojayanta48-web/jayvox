<!-- ===== FIREBASE ===== -->
<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
runTransaction
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyACzipenb7Sx0-XsNF8xiNCEE8uIeOsXuU",
authDomain:"jayvox-be536.firebaseapp.com",
databaseURL:"https://jayvox-be536-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"jayvox-be536",
storageBucket:"jayvox-be536.firebasestorage.app",
messagingSenderId:"427814511964",
appId:"1:427814511964:web:e8a16e2e2275ef1d160d99"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

async function loadSongs(){

const res=await fetch("songs.json");
const songs=await res.json();

const container=document.getElementById("songs");
container.innerHTML="";

let categories={};

songs.forEach(song=>{
if(!categories[song.category])
categories[song.category]=[];
categories[song.category].push(song);
});

for(let cat in categories){

const catTitle=document.createElement("h2");
catTitle.className="category";
catTitle.innerText=cat;
container.appendChild(catTitle);

categories[cat].forEach(song=>{

const audioSrc=
song.file.startsWith("http")
? song.file
: "songs/"+song.file;

const slug=song.title
.toLowerCase()
.replace(/\s+/g,"-");

const card=document.createElement("div");
card.className="song";

card.innerHTML=`
<h3 onclick="openSong('${slug}')">${song.title}</h3>
<img src="images/${song.image}">
<audio controls src="${audioSrc}"></audio>
<div class="playcount">Played 0 times</div>
`;

container.appendChild(card);

const audio=card.querySelector("audio");
const counter=card.querySelector(".playcount");

let counted=false;

audio.addEventListener("play",()=>{

if(counted) return;
counted=true;

const playRef=ref(db,"plays/"+slug);

runTransaction(playRef,(val)=>{
return (val||0)+1;
}).then(res=>{
counter.innerText="Played "+res.snapshot.val()+" times";
});

});

});

}

}

window.openSong=function(slug){
window.location.href="song.html?song="+slug;
};

loadSongs();

</script>

</body>
