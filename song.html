<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JayVox</title>

<!-- ✅ Favicon -->
<link rel="icon" href="/favicon.ico">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:black;
color:white;
text-align:center;
}

/* HEADER */
header{
background:linear-gradient(90deg,#000,#a00000);
padding:18px;
display:flex;
align-items:center;
gap:15px;
}

header img{
width:55px;
border-radius:10px;
}

header h1{
margin:0;
}

/* SONG PAGE */
.container{
max-width:700px;
margin:auto;
padding:25px;
}

.cover{
width:240px;
border-radius:12px;
box-shadow:0 0 18px red;
margin-top:15px;
}

audio{
width:100%;
margin-top:20px;
}

.back{
display:inline-block;
margin-top:25px;
padding:12px 22px;
background:#b30000;
color:white;
text-decoration:none;
border-radius:8px;
}

.back:hover{
background:red;
}

</style>

</head>

<body>

<!-- ✅ SITE HEADER -->
<header>
<img src="/images/logo.png">
<h1>JayVox</h1>
</header>

<div class="container">

<h2 id="title">Loading...</h2>

<img id="cover" class="cover">

<br>

<audio id="player" controls></audio>

<br>

<a class="back" href="/">⬅ Back to Home</a>

</div>

<script>

/* -------- GET SLUG -------- */

function getSlug(){

// Pretty URL: /raato-raani
let slug = location.pathname.replace(/^\/+/,'').toLowerCase();

// If opened as song.html?song=
if(location.search){
const param =
new URLSearchParams(location.search).get("song");
if(param) slug = param;
}

return slug;
}

/* -------- LOAD SONG -------- */

async function loadSong(){

const slug = getSlug();

const res = await fetch("/songs.json");
const songs = await res.json();

const song = songs.find(
s => s.title.toLowerCase().replace(/\s+/g,'-') === slug
);

if(!song){
document.getElementById("title").innerText="Song not found";
return;
}

/* Title + SEO */
document.title = song.title + " | JayVox";

/* UI */
document.getElementById("title").innerText = song.title;
document.getElementById("cover").src = "/images/" + song.image;

/* IMPORTANT FIX — AUDIO PATH */
document.getElementById("player").src = song.file;

}

loadSong();

</script>

</body>
</html>
