<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JayVox Song</title>

<link rel="icon" href="images/favicon.ico">

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
}

img{
width:220px;
border-radius:12px;
box-shadow:0 0 15px red;
}

audio{
width:100%;
margin-top:20px;
}

a{
color:#ff4444;
text-decoration:none;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1 id="title">Loading...</h1>

<img id="cover">

<br>

<audio id="player" controls></audio>

<br><br>

<a href="index.html">⬅ Back to JayVox</a>

</div>

<script>

async function loadSong(){

const params = new URLSearchParams(window.location.search);
const songName = params.get("song");

const res = await fetch("songs.json");
const songs = await res.json();

const song = songs.find(s =>
s.title.toLowerCase().replace(/\s+/g,'-') === songName
);

if(!song){
document.body.innerHTML="<h2>Song not found</h2>";
return;
}

document.title = song.title + " | JayVox";

document.getElementById("title").innerText = song.title;
document.getElementById("cover").src = "images/" + song.image;
document.getElementById("player").src = song.file;

}

loadSong();

</script>

</body>
</html>
